<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 蓝紫渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  
  <!-- 剪贴板形状 -->
  <g transform="translate(50, 50)">
    <!-- 夹子顶部 -->
    <rect x="-8" y="-28" width="16" height="10" rx="3" fill="white" opacity="0.9"/>
    <rect x="-6" y="-26" width="12" height="4" rx="1" fill="#3B82F6"/>
    
    <!-- 剪贴板主体 -->
    <rect x="-28" y="-18" width="56" height="52" rx="6" fill="white" opacity="0.95"/>
    
    <!-- 清单线条 -->
    <g transform="translate(-16, -6)">
      <line x1="0" y1="0" x2="32" y2="0" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="10" x2="32" y2="10" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="20" x2="24" y2="20" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    </g>
    
    <!-- 复选标记 -->
    <g transform="translate(-24, -8)">
      <rect x="0" y="0" width="10" height="10" rx="2.5" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
      <path d="M 2 5 L 4.5 7.5 L 8 2" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(-24, 2)">
      <rect x="0" y="0" width="10" height="10" rx="2.5" fill="none" stroke="#8B5CF6" stroke-width="2.5"/>
    </g>
  </g>
</svg>
