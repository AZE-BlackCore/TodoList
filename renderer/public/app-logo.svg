<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 主渐变：蓝紫渐变，现代科技感 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 次要渐变：金色点缀 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆角正方形 -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#mainGradient)" filter="url(#shadow)"/>
  
  <!-- 外环装饰 -->
  <rect x="12" y="12" width="76" height="76" rx="16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- 待办清单图标 - 简化设计 -->
  <g transform="translate(50, 50)">
    <!-- 清单背景 -->
    <rect x="-22" y="-18" width="44" height="36" rx="6" fill="rgba(255,255,255,0.15)"/>
    
    <!-- 清单线条 -->
    <line x1="-14" y1="-6" x2="14" y2="-6" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="-14" y1="4" x2="14" y2="4" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="-14" y1="14" x2="6" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    
    <!-- 复选框 -->
    <rect x="-18" y="-10" width="8" height="8" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <rect x="-18" y="0" width="8" height="8" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <rect x="-18" y="10" width="8" height="8" rx="2" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
    
    <!-- 完成标记 - 对勾 -->
    <path d="M -16 -6 L -14 -4 L -12 -8" fill="none" stroke="url(#accentGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 右上角装饰星星 -->
  <g transform="translate(72, 22)">
    <path d="M 0 -6 L 1.5 -2 L 6 -2 L 2.5 1 L 4 5.5 L 0 2.5 L -4 5.5 L -2.5 1 L -6 -2 L -1.5 -2 Z" 
          fill="url(#accentGradient)" 
          opacity="0.9"/>
  </g>
  
  <!-- 底部高光 -->
  <ellipse cx="50" cy="88" rx="30" ry="6" fill="rgba(255,255,255,0.1)"/>
</svg>
